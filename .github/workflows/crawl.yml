name: Daangn Crawler
on:
  workflow_dispatch:
    inputs:
      keyword:
        description: '검색 키워드'
        required: true
        default: '루이비통'
      search_scope:
        description: '검색 범위 (title=제목만, both=제목+내용)'
        required: false
        default: 'both'
      chunk_start:
        description: '시작 청크 번호'
        required: false
        default: '1'
      chunk_end:
        description: '끝 청크 번호'
        required: false
        default: '20'
      total_chunks:
        description: '전체 청크 수'
        required: false
        default: '80'
      max_workers:
        description: '청크당 동시 요청 수'
        required: false
        default: '3'
      delay_min:
        description: '딜레이 최소(초)'
        required: false
        default: '0.5'
      delay_max:
        description: '딜레이 최대(초)'
        required: false
        default: '1.0'
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        run: |
          python3 - << 'PYEOF'
          import json, os
          s = int(os.environ.get('CHUNK_START', '1'))
          e = int(os.environ.get('CHUNK_END', '20'))
          matrix = json.dumps({"chunk": list(range(s, e + 1))})
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"matrix={matrix}\n")
          print(f"matrix={matrix}")
          PYEOF
        env:
          CHUNK_START: ${{ github.event.inputs.chunk_start }}
          CHUNK_END: ${{ github.event.inputs.chunk_end }}
  crawl:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      max-parallel: 50
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run crawler
        run: >
          python crawler.py
          "${{ github.event.inputs.keyword }}"
          "${{ github.event.inputs.search_scope }}"
          "${{ matrix.chunk }}"
          "${{ github.event.inputs.total_chunks }}"
          "${{ github.event.inputs.max_workers }}"
          "${{ github.event.inputs.delay_min }}"
          "${{ github.event.inputs.delay_max }}"
        continue-on-error: true
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-chunk-${{ matrix.chunk }}
          path: results_${{ matrix.chunk }}.json
          retention-days: 1